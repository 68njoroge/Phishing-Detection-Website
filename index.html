<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhishGuard — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0a0e1a;
            --surface:  #111827;
            --card:     #1a2235;
            --border:   #1e3a5f;
            --text:     #e2e8f0;
            --muted:    #64748b;
            --primary:  #3b82f6;
            --primary2: #6366f1;
            --green:    #10b981;
            --red:      #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(ellipse at 20% 50%, #0f2040 0%, var(--bg) 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            margin: 2rem;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 2rem;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
        }

        .auth-logo svg { width: 36px; height: 36px; }

        .auth-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group { margin-bottom: 1.2rem; }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.35);
        }

        .btn-google {
            width: 100%;
            padding: 0.9rem;
            background: white;
            color: #1f2937;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 1.2rem;
        }

        .btn-google:hover { background: #f3f4f6; transform: translateY(-1px); }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .auth-switch a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-switch a:hover { text-decoration: underline; }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7;
        }

        @media (max-width: 480px) {
            .auth-box { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="auth-box">
    <a class="auth-logo" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2">
            <path d="M12 2L2 7v10l10 5 10-5V7z"/>
            <circle cx="12" cy="12" r="3.5"/>
        </svg>
        PhishGuard
    </a>

    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join PhishGuard to save your scan history</p>

    <div class="alert alert-error" id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>

    <button class="btn-google" onclick="googleSignIn()">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
    </button>

    <div class="divider">or sign up with email</div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" />
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" />
    </div>

    <button class="btn-primary" onclick="register()">Create Account</button>

    <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<script>
    const API = "http://127.0.0.1:5000";

    // If already logged in go straight to app
    const saved = localStorage.getItem('phishguard_user');
    if (saved) window.location.href = 'app.html';

    function googleSignIn() {
        window.location.href = `${API}/auth/google/login`;
    }

    async function register() {
        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        hide('errorMsg'); hide('successMsg');

        if (!name || !email || !password) return show('errorMsg', 'Please fill in all fields.');
        if (password.length < 6) return show('errorMsg', 'Password must be at least 6 characters.');

        try {
            const res  = await fetch(`${API}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();

            if (!res.ok) return show('errorMsg', data.error);

            localStorage.setItem('phishguard_user', JSON.stringify(data.user));
            show('successMsg', 'Account created! Redirecting...');
            setTimeout(() => window.location.href = 'app.html', 1000);

        } catch(e) {
            show('errorMsg', 'Cannot connect to server. Is Flask running?');
        }
    }

    function show(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hide(id) {
        document.getElementById(id).style.display = 'none';
    }

    // Enter key support
    document.addEventListener('keypress', e => {
        if (e.key === 'Enter') register();
    });
</script>
</body>
</html>
