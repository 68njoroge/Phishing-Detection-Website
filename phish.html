<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>phishGuard — Real-time Phishing Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f1117;
            --surface: #161b22;
            --card: #1e2937;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.6rem;
            font-weight: 700;
            gap: 0.5rem;
        }

            .logo svg {
                width: 36px;
                height: 36px;
            }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 1.3rem;
            font-weight: 500;
        }

            nav a:hover {
                color: white;
            }

        .btn-signin {
            background: var(--primary);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

            .btn-signin:hover {
                background: #4f46e5;
            }

        main {
            max-width: 1240px;
            margin: 5rem auto;
            padding: 0 5%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
            text-align: center;
        }

        .subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .scanner-tabs {
            display: inline-flex;
            background: transparent; /* no container bg */
            border: none;
            gap: 2.5rem; /* more breathing room */
            margin: 0 auto 3rem;
            position: relative;
            font-size: 1.15rem;
            font-weight: 500;
        }

        .tab {
            position: relative;
            padding: 0.9rem 0.4rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.25s ease;
            user-select: none;
        }

            .tab:hover {
                color: #cbd5e1;
            }

            .tab.active {
                color: white;
                font-weight: 600;
            }

                .tab.active::after {
                    content: '';
                    position: absolute;
                    bottom: -6px;
                    left: 0;
                    right: 0;
                    height: 3px;
                    background: var(--primary);
                    border-radius: 3px;
                    transition: all 0.3s ease;
                }

        .input-wrapper {
            position: relative;
            max-width: 860px;
            margin: 0 auto 4rem;
        }

        #scanInput {
            width: 100%;
            padding: 1.5rem 2.2rem;
            font-size: 1.3rem;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 18px;
            color: white;
            outline: none;
            transition: all 0.25s;
        }

            #scanInput::placeholder {
                color: #64748b;
                font-size: 1.25rem;
                opacity: 0.75;
            }

            #scanInput:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 5px rgba(99,102,241,0.3);
                background: #1a2230;
            }

        .btn-scan {
            position: absolute;
            right: 12px;
            top: 12px;
            bottom: 12px;
            padding: 0 2.6rem;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.25s;
        }

            .btn-scan:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 28px rgba(99,102,241,0.4);
            }

            .btn-scan.loading {
                opacity: 0.85;
                cursor: wait;
            }

                .btn-scan.loading::after {
                    content: " Scanning...";
                    animation: pulse 1.5s infinite;
                }

        @keyframes pulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: 0.55
            }
        }

        /* ── New Results Layout ── */
        #results-container {
            display: none;
            margin-top: 4rem;
        }

        .verdict-banner {
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 3rem;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .verdict-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .verdict-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .verdict-desc {
            font-size: 1.3rem;
            color: var(--text-muted);
        }

        .breakdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 3rem;
        }

        .break-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.8rem;
            text-align: center;
        }

        .break-score {
            font-size: 2.4rem;
            font-weight: 700;
            margin: 0.8rem 0;
        }

        .break-label {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .recent-scans {
            margin-top: 4rem;
        }

        .recent-title {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--text-muted);
        }

        .recent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.6rem;
        }

        .small-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.4rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
        }

            .small-card:hover {
                transform: translateY(-6px);
                border-color: var(--primary);
            }

        .circle-small {
            width: 90px;
            height: 90px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            box-shadow: inset 0 0 16px rgba(0,0,0,0.4);
        }

        .safe {
            background: conic-gradient(var(--green) 0% var(--score), #334155 var(--score) 100%);
        }

        .suspicious {
            background: conic-gradient(var(--yellow) 0% var(--score), #334155 var(--score) 100%);
        }

        .danger {
            background: conic-gradient(var(--red) 0% var(--score), #334155 var(--score) 100%);
        }

        .circle-small span {
            background: var(--card);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal (kept simple) */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface);
            width: 90%;
            max-width: 540px;
            border-radius: 20px;
            padding: 2.2rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        @media (max-width:768px) {
            h1 {
                font-size: 2.4rem;
            }

            .verdict-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.3">
                <path d="M12 2L2 7v10l10 5 10-5V7z" />
                <circle cx="12" cy="12" r="3.8" />
            </svg>
            phishGuard
        </div>
        <nav>
            <a href="#">Intelligence</a>
            <a href="#">Company</a>
            <button class="btn-signin">Sign in</button>
        </nav>
    </header>

    <main>
        <h1>PhishGuard Detects and Monitors<br>Phishing and Scam Sites</h1>
        <p class="subtitle">Real-time protection powered by hybrid machine learning</p>

        <div class="scanner-tabs">
            <div class="tab active" data-type="url">URL Scanner</div>
            <div class="tab" data-type="domain">.com Domain Scanner</div>
        </div>

        <div class="input-wrapper">
            <input type="text" id="scanInput" placeholder="Paste URL or domain here..." autocomplete="off" />
            <button class="btn-scan" id="scanBtn">Scan</button>
        </div>

        <div id="results-container">
            <div class="verdict-banner" id="verdictBanner"></div>

            <div class="breakdown-grid" id="breakdownGrid"></div>

            <div class="recent-scans">
                <h3 class="recent-title">Recent Scans</h3>
                <div class="recent-grid" id="recentGrid"></div>
            </div>
        </div>
    </main>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">×</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ── State ──
        let currentMode = "url";
        let recentScans = [];

        // ── DOM ──
        const tabs = document.querySelectorAll('.tab');
        const scanInput = document.getElementById('scanInput');
        const scanBtn = document.getElementById('scanBtn');
        const resultsContainer = document.getElementById('results-container');
        const verdictBanner = document.getElementById('verdictBanner');
        const breakdownGrid = document.getElementById('breakdownGrid');
        const recentGrid = document.getElementById('recentGrid');
        const modal = document.getElementById('detailModal');
        const modalClose = document.getElementById('modalClose');

        // ── Tabs ──
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMode = tab.dataset.type;
                scanInput.placeholder = currentMode === "domain"
                    ? "Scan .com Domain (e.g. example.com)"
                    : "Paste URL or domain here...";
                scanInput.focus();
            });
        });

        // ── Scan ──
        scanBtn.addEventListener('click', async () => {

            const value = scanInput.value.trim();
            if (!value) return alert("Please enter a URL or domain");

            scanBtn.classList.add('loading');
            scanBtn.disabled = true;
            scanInput.disabled = true;

            try {

                const response = await fetch("http://127.0.0.1:5000/api/scan", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: value,
                        mode: currentMode
                    })
                });

                const data = await response.json();

                scanBtn.classList.remove('loading');
                scanBtn.disabled = false;
                scanInput.disabled = false;

                if (data.error) {
                    alert(data.error);
                    return;
                }

                const scan = {
                    url: data.url,
                    score: data.score,
                    type: data.type,
                    verdict: data.verdict,
                    breakdown: data.breakdown,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    mode: currentMode
                };

                recentScans.unshift(scan);
                if (recentScans.length > 6) recentScans.pop();

                showResults(scan);

                scanInput.value = "";

            } catch (error) {

                scanBtn.classList.remove('loading');
                scanBtn.disabled = false;
                scanInput.disabled = false;

                alert("Error connecting to API. Make sure Flask server is running.");
                console.error(error);
            }

        });

        // ── Show Results ──
        function showResults(scan) {
            // Banner
            verdictBanner.innerHTML = `
                <div class="verdict-icon" style="color: ${scan.type === 'safe' ? 'var(--green)' : scan.type === 'suspicious' ? 'var(--yellow)' : 'var(--red)'}">
                    ${scan.type === 'safe' ? '✅' : scan.type === 'suspicious' ? '⚠️' : '🚨'}
                </div>
                <div class="verdict-title" style="color: ${scan.type === 'safe' ? 'var(--green)' : scan.type === 'suspicious' ? 'var(--yellow)' : 'var(--red)'}">
                    ${scan.verdict}
                </div>
                <div class="verdict-desc">
                    Confidence: <strong>${scan.score}%</strong> • Scanned: ${scan.timestamp} • ${scan.mode.toUpperCase()} Scanner
                </div>
            `;

            // Breakdown (real ML outputs)
            breakdownGrid.innerHTML = `
                <div class="break-card">
                    <div class="break-label">Lexical Analysis</div>
                    <div class="break-score">${scan.breakdown?.["Lexical Analysis"] || ""}</div>
                    <div style="color:var(--text-muted); font-size:0.95rem;">URL structure & keywords check</div>
                </div>
                <div class="break-card">
                    <div class="break-label">Hybrid ML Model</div>
                    <div class="break-score">${scan.breakdown?.["Hybrid ML Model"] || ""}</div>
                    <div style="color:var(--text-muted); font-size:0.95rem;">Neural network classification</div>
                </div>
                <div class="break-card">
                    <div class="break-label">Domain Reputation</div>
                    <div class="break-score">${scan.breakdown?.["Domain Reputation"] || ""}</div>
                    <div style="color:var(--text-muted); font-size:0.95rem;">Age, WHOIS, history</div>
                </div>
                <div class="break-card">
                    <div class="break-label">Behavioral Signals</div>
                    <div class="break-score">${scan.breakdown?.["Behavioral Signals"] || ""}</div>
                    <div style="color:var(--text-muted); font-size:0.95rem;">Redirects, scripts, content</div>
                </div>
            `;

            // Recent scans
            recentGrid.innerHTML = '';
            recentScans.forEach(s => {
                const card = document.createElement('div');
                card.className = 'small-card';
                card.style.setProperty('--score', `${s.score}%`);
                card.innerHTML = `
                    <div class="circle-small ${s.type}">
                        <span>${s.score}%</span>
                    </div>
                    <div style="font-weight:600; color:${s.type === 'safe' ? 'var(--green)' : s.type === 'suspicious' ? 'var(--yellow)' : 'var(--red)'}">
                        ${s.verdict.split(' – ')[0]}
                    </div>
                    <div style="font-size:0.9rem; color:var(--text-muted); margin-top:0.4rem;">${s.timestamp}</div>
                `;
                card.onclick = () => {
                    document.getElementById('modalTitle').textContent = `${s.verdict} (${s.score}%)`;
                    document.getElementById('modalBody').innerHTML = `
                        <p><strong>Scanned:</strong> ${s.url}</p>
                        <p><strong>Mode:</strong> ${s.mode.toUpperCase()} Scanner</p>
                        <p><strong>Time:</strong> ${s.timestamp}</p>
                        <p style="margin-top:1.5rem; color:var(--text-muted);">Click outside to close</p>
                    `;
                    modal.style.display = 'flex';
                };
                recentGrid.appendChild(card);
            });

            resultsContainer.style.display = 'block';
            resultsContainer.scrollIntoView({ behavior: 'smooth' });
        }

        // ── Modal close ──
        modalClose.onclick = () => modal.style.display = 'none';
        modal.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };

        // Enter key triggers scan
        scanInput.addEventListener('keypress', e => { if (e.key === 'Enter') scanBtn.click(); });
    </script>
</body>
</html>
